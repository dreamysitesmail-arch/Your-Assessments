<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychology Self-Reflection Assessments</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#f6f8fc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--primary:#111827;
--primary2:#334155;
--green:#dcfce7;
--blue:#dbeafe;
--orange:#fed7aa;
--red:#fecaca;
--radius:18px;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#f8fafc,#f1f5f9);
color:var(--text)
}

.wrap{max-width:980px;margin:auto;padding:24px}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:22px;
margin-bottom:18px
}

h1,h2,h3{margin-top:0}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:14px
}

.test-card{
border:1px solid var(--border);
border-radius:14px;
padding:16px;
background:#fff
}

.btn{
padding:12px 18px;
border-radius:14px;
border:1px solid var(--border);
background:#fff;
font-weight:700;
cursor:pointer
}

.btn.primary{
background:var(--primary);
color:#fff
}

.btn-row{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:22px
}

.progress-label{
display:flex;
justify-content:space-between;
font-size:13px;
color:var(--muted);
margin:10px 0 8px
}

.progress{
height:12px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden
}

.progress div{
height:100%;
background:linear-gradient(90deg,var(--primary),var(--primary2))
}

.question-shell{text-align:center;padding:28px}

.question-text{
font-size:26px;
line-height:1.4;
max-width:760px;
margin:auto;
font-weight:700
}

.scale{
display:grid;
grid-template-columns:repeat(6,minmax(70px,1fr));
gap:10px;
margin-top:16px
}

.score-btn{
border:1px solid var(--border);
border-radius:14px;
padding:12px;
cursor:pointer;
font-weight:700
}

.score-btn .n{
font-size:20px;
display:block
}

.score-btn .t{
font-size:12px;
color:var(--muted)
}

.score-btn.active{
background:var(--primary);
color:white
}

.chart-wrap{
border:1px solid var(--border);
border-radius:14px;
padding:18px
}

.low{background:var(--green);padding:6px 10px;border-radius:999px}
.mild{background:var(--blue);padding:6px 10px;border-radius:999px}
.moderate{background:var(--orange);padding:6px 10px;border-radius:999px}
.high{background:var(--red);padding:6px 10px;border-radius:999px}

</style>
</head>

<body>

<div id="app"></div>

<script>

const SCALE=[
{value:0,text:'Not true'},
{value:1,text:'Rarely'},
{value:2,text:'Sometimes'},
{value:3,text:'Often'},
{value:4,text:'Very often'},
{value:5,text:'Almost always'}
]

const tests={

narcissism:{
name:'Narcissistic Traits',
thresholds:[150,300,450],
sections:[
{title:'Admiration',questions:[
'I enjoy receiving praise for achievements',
'I appreciate admiration from others',
'I enjoy recognition for success',
'I like attention for accomplishments',
'I enjoy compliments',
'I feel energized by praise'
]},
{title:'Superiority',questions:[
'I believe my ideas are better than most',
'I feel intellectually confident',
'I often outperform peers',
'I believe I have exceptional potential',
'I feel highly capable',
'I feel confident about success'
]}
]
},

bpd:{
name:'Borderline Personality',
thresholds:[60,120,180],
sections:[
{title:'Abandonment Fear',questions:[
'I fear people leaving me',
'I feel anxious when relationships feel distant',
'I worry about rejection',
'I feel panic about abandonment',
'I worry about losing people',
'I fear being left alone'
]},
{title:'Emotional Intensity',questions:[
'My mood shifts quickly',
'I feel intense emotions',
'Small events trigger strong reactions',
'I feel emotionally overwhelmed',
'I experience emotional extremes',
'I struggle regulating feelings'
]}
]
},

adhd:{
name:'ADHD',
thresholds:[60,120,180],
sections:[
{title:'Attention',questions:[
'I struggle focusing on tasks',
'My mind drifts during conversations',
'I start tasks without finishing',
'I lose concentration easily',
'I make careless mistakes',
'I struggle focusing while reading'
]},
{title:'Impulsivity',questions:[
'I interrupt others',
'I act before thinking',
'I make quick decisions',
'I struggle waiting my turn',
'I regret impulsive actions',
'I speak without thinking'
]}
]
},

bipolar:{
name:'Bipolar Mood Patterns',
thresholds:[60,120,180],
sections:[
{title:'Elevated Mood',questions:[
'I feel unusually energetic',
'I feel extremely confident',
'I have racing thoughts',
'I need less sleep',
'I feel unusually productive',
'I feel unstoppable'
]},
{title:'Depressive Mood',questions:[
'I experience deep sadness',
'I lose motivation',
'I feel emotionally drained',
'I feel hopeless',
'I struggle with daily tasks',
'I lose interest in activities'
]}
]
},

codependency:{
name:'Codependency',
thresholds:[60,120,180],
sections:[
{title:'Self Worth',questions:[
'I feel responsible for others emotions',
'My self esteem depends on others',
'I rely on validation',
'I lose myself in relationships',
'I feel valuable when needed',
'I struggle feeling secure alone'
]},
{title:'People Pleasing',questions:[
'I prioritize others over myself',
'I struggle disappointing people',
'I say yes when I want to say no',
'I try to keep everyone happy',
'I fear conflict',
'I sacrifice needs for relationships'
]}
]
}

}

let currentTest=null
let flatQuestions=[]
let answers=[]
let currentIndex=0
let radarChart=null

function renderHome(){

document.getElementById("app").innerHTML=`

<div class="wrap">

<div class="card">
<h1>Psychology Self-Reflection Assessments</h1>
<p>Select a test below.</p>
</div>

<div class="cards">

${Object.keys(tests).map(k=>`
<div class="test-card">
<h3>${tests[k].name}</h3>
<div class="btn-row">
<button class="btn primary" onclick="startTest('${k}')">Start</button>
</div>
</div>
`).join("")}

</div>

</div>
`

}

function startTest(name){

currentTest=name
flatQuestions=[]

tests[name].sections.forEach((s,i)=>{
s.questions.forEach(q=>{
flatQuestions.push({text:q,section:i})
})
})

answers=Array(flatQuestions.length).fill(null)
currentIndex=0

renderQuiz()

}

function renderQuiz(){

const q=flatQuestions[currentIndex]

const answered=answers.filter(v=>v!==null).length
const progress=Math.round((answered/flatQuestions.length)*100)

document.getElementById("app").innerHTML=`

<div class="wrap">

<div class="card">

<h2>${tests[currentTest].name}</h2>

<div class="progress-label">
<span>Progress</span>
<span>${progress}%</span>
</div>

<div class="progress">
<div style="width:${progress}%"></div>
</div>

</div>

<div class="card question-shell">

<div class="question-text">${q.text}</div>

<div class="scale">

${SCALE.map(s=>`
<button class="score-btn ${answers[currentIndex]===s.value?'active':''}" data-score="${s.value}">
<span class="n">${s.value}</span>
<span class="t">${s.text}</span>
</button>
`).join("")}

</div>

<div class="btn-row">
<button class="btn" onclick="prev()">Previous</button>
<button class="btn primary" onclick="next()">${currentIndex===flatQuestions.length-1?'Results':'Next'}</button>
</div>

</div>

</div>
`

document.querySelectorAll("[data-score]").forEach(btn=>{
btn.onclick=function(){
answers[currentIndex]=Number(this.dataset.score)
renderQuiz()
}
})

}

function prev(){
if(currentIndex>0){currentIndex--;renderQuiz()}
}

function next(){
if(currentIndex<flatQuestions.length-1){
currentIndex++
renderQuiz()
}else{
renderResults()
}
}

function renderResults(){

const score=answers.reduce((a,b)=>a+(b||0),0)

const labels=tests[currentTest].sections.map(s=>s.title)

const data=tests[currentTest].sections.map((s,i)=>{
let start=i*6
return answers.slice(start,start+6).reduce((a,b)=>a+(b||0),0)
})

document.getElementById("app").innerHTML=`

<div class="wrap">

<div class="card">
<h1>Your Score</h1>
<h2>${score}</h2>

<div class="chart-wrap">
<canvas id="radarChart"></canvas>
</div>

<div class="btn-row">
<button class="btn" onclick="renderHome()">Home</button>
<button class="btn primary" onclick="startTest('${currentTest}')">Restart</button>
</div>

</div>

</div>
`

const ctx=document.getElementById("radarChart")

if(radarChart) radarChart.destroy()

radarChart=new Chart(ctx,{
type:'radar',
data:{
labels:labels,
datasets:[{
label:'Score',
data:data,
backgroundColor:'rgba(59,130,246,0.2)',
borderColor:'rgba(30,64,175,1)'
}]
},
options:{responsive:true,plugins:{legend:{display:false}}}
})

}

renderHome()

</script>

</body>
</html>
