<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Psychology Self-Reflection Assessments</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f6f8fc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--primary:#111827;
--primary-2:#334155;
--blue:#dbeafe;
--green:#dcfce7;
--orange:#fed7aa;
--red:#fecaca;
--shadow:0 10px 30px rgba(15,23,42,.08);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#f8fafc,#f1f5f9);
color:var(--text)
}

.wrap{
max-width:980px;
margin:0 auto;
padding:24px
}

.card{
background:var(--card);
border:1px solid rgba(226,232,240,.9);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:22px;
margin-bottom:18px
}

.hero{padding:28px}

h1{font-size:32px;margin-bottom:10px}

.muted{color:var(--muted);line-height:1.6}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:14px
}

.test-card{
border:1px solid var(--border);
border-radius:14px;
padding:16px;
background:#fff
}

.btn{
padding:12px 18px;
border-radius:14px;
border:1px solid var(--border);
background:#fff;
font-weight:700;
cursor:pointer
}

.btn.primary{
background:var(--primary);
color:#fff;
border-color:var(--primary
}
