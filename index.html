<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Psychology Self-Reflection Assessments</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#f6f8fc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--primary:#111827;
--primary-2:#334155;
--blue:#dbeafe;
--green:#dcfce7;
--orange:#fed7aa;
--red:#fecaca;
--shadow:0 10px 30px rgba(15,23,42,.08);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#f8fafc,#f1f5f9);
color:var(--text)
}

.wrap{max-width:980px;margin:0 auto;padding:24px}

.card{
background:var(--card);
border:1px solid rgba(226,232,240,.9);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:22px;
margin-bottom:18px
}

.hero{padding:28px}

h1,h2,h3{margin-top:0}

.muted{color:var(--muted);line-height:1.6}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:14px
}

.test-card{
border:1px solid var(--border);
border-radius:14px;
padding:16px;
background:#fff
}

.test-card h3{margin-bottom:6px}

.btn{
padding:12px 18px;
border-radius:14px;
border:1px solid var(--border);
background:#fff;
font-size:14px;
font-weight:700;
cursor:pointer
}

.btn.primary{
background:var(--primary);
color:#fff;
border-color:var(--primary)
}

.btn-row{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:22px
}

.question-shell{text-align:center;padding:28px}

.question-text{
font-size:26px;
line-height:1.4;
max-width:760px;
margin:0 auto 22px;
font-weight:700
}

.scale{
display:grid;
grid-template-columns:repeat(6,minmax(70px,1fr));
gap:10px;
margin-top:10px
}

.score-btn{
border:1px solid var(--border);
background:#fff;
border-radius:16px;
padding:14px 10px;
cursor:pointer;
font-weight:700
}

.score-btn:hover{
transform:translateY(-1px);
border-color:#94a3b8
}

.score-btn .n{
display:block;
font-size:22px;
margin-bottom:5px
}

.score-btn .t{
display:block;
font-size:12px;
color:var(--muted);
font-weight:600
}

.score-btn.active{
background:var(--primary);
color:#fff
}

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:14px
}

.chart-wrap{
background:#fff;
border:1px solid var(--border);
border-radius:14px;
padding:18px;
min-height:380px
}

.low{background:var(--green);color:#166534}
.mild{background:var(--blue);color:#1d4ed8}
.moderate{background:var(--orange);color:#c2410c}
.high{background:var(--red);color:#b91c1c}

.pill{
display:inline-block;
padding:7px 11px;
border-radius:999px;
font-size:12px;
font-weight:800;
margin:8px 0 14px
}

</style>
</head>

<body>

<div id="app"></div>

<script>

const SCALE=[
{value:0,text:'Not true'},
{value:1,text:'Rarely'},
{value:2,text:'Sometimes'},
{value:3,text:'Often'},
{value:4,text:'Very often'},
{value:5,text:'Almost always'}
];

const tests={

narcissism:{name:'Narcissism Assessment',intro:'Explores admiration, entitlement, status and empathy patterns.',thresholds:[150,300,450],sectionMax:50,sections:[
{title:'Admiration',questions:['I enjoy praise for achievements','Recognition motivates me','I enjoy public admiration','I like attention for success','I enjoy compliments','Praise energizes me']},
{title:'Superiority',questions:['My ideas are often better','I feel intellectually strong','I often outperform peers','I feel highly capable','I believe in exceptional success','I feel highly competent']}
]},

bpd:{name:'Borderline Personality Assessment',intro:'Explores emotional intensity and relationship patterns.',thresholds:[60,120,180],sectionMax:30,sections:[
{title:'Fear of Abandonment',questions:['I fear people leaving','Rejection hurts deeply','Distance causes anxiety','I fear losing relationships','I feel panic about abandonment','Loneliness feels unsafe']},
{title:'Emotional Instability',questions:['My mood changes quickly','I feel emotional extremes','Small events trigger strong emotions','My moods shift rapidly','I feel emotionally overwhelmed','My emotions fluctuate strongly']}
]},

adhd:{name:'ADHD Assessment',intro:'Focus, impulsivity and organization patterns.',thresholds:[60,120,180],sectionMax:30,sections:[
{title:'Focus',questions:['I struggle to focus','My mind drifts','I start tasks without finishing','I lose concentration easily','I make careless mistakes','Reading long text is hard']},
{title:'Impulsivity',questions:['I interrupt others','I act before thinking','I make quick decisions','I struggle waiting my turn','I regret impulsive actions','I speak without thinking']}
]},

bipolar:{name:'Bipolar Mood Patterns',intro:'Explores mood elevation and depression cycles.',thresholds:[60,120,180],sectionMax:30,sections:[
{title:'Elevated Mood',questions:['I feel unusually energetic','My confidence spikes','Ideas race quickly','Sleep decreases','I feel unstoppable','My productivity increases']},
{title:'Depression',questions:['I feel deep sadness','Motivation disappears','Energy drops','I feel hopeless','Tasks feel difficult','I lose interest']}
]},

codependency:{
name:'Codependency Assessment',
intro:'Explores people-pleasing, boundaries, rescuing behavior and emotional dependence.',
thresholds:[60,120,180],
sectionMax:30,
sections:[
{title:'Self Worth',questions:[
'I feel responsible for other people’s emotions.',
'My self-esteem depends on others.',
'I rely on validation.',
'I lose identity in relationships.',
'I feel valuable when needed.',
'I struggle being alone.'
]},
{title:'People Pleasing',questions:[
'I prioritize others over myself.',
'I dislike disappointing people.',
'I say yes when I mean no.',
'I try to keep everyone happy.',
'I fear disagreement.',
'I maintain relationship harmony.'
]},
{title:'Boundaries',questions:[
'I feel guilty setting boundaries.',
'I struggle to say no.',
'I allow limits to be crossed.',
'I tolerate uncomfortable behavior.',
'I fear people leaving.',
'I avoid conflict.'
]},
{title:'Emotional Dependence',questions:[
'My mood depends on others.',
'I feel anxious when others are upset.',
'I fear losing relationships.',
'I seek reassurance.',
'I feel empty when single.',
'I feel incomplete without support.'
]}
]

}

};

let currentTest=null;
let flatQuestions=[];
let answers=[];
let currentIndex=0;
let radarChart=null;

function renderHome(){

document.getElementById("app").innerHTML=`
<div class="wrap">

<div class="card hero">
<h1>Psychology Self-Reflection Assessments</h1>
<p class="muted">Choose an assessment to begin.</p>
</div>

<div class="cards">

${Object.keys(tests).map(key=>`
<div class="test-card">
<h3>${tests[key].name}</h3>
<p class="muted">${tests[key].intro}</p>
<div class="btn-row">
<button class="btn primary" onclick="startTest('${key}')">Start</button>
</div>
</div>
`).join("")}

</div>

</div>
`;
}

function startTest(name){

currentTest=name;

flatQuestions=[];

tests[name].sections.forEach(section=>{
section.questions.forEach(q=>{
flatQuestions.push(q);
});
});

answers=Array(flatQuestions.length).fill(null);

currentIndex=0;

renderQuiz();

}

function renderQuiz(){

const q=flatQuestions[currentIndex];

document.getElementById("app").innerHTML=`

<div class="wrap">

<div class="card question-shell">

<h1>${tests[currentTest].name}</h1>

<div class="question-text">${q}</div>

<div class="scale">

${SCALE.map(item=>`
<button class="score-btn ${answers[currentIndex]===item.value?'active':''}" data-score="${item.value}">
<span class="n">${item.value}</span>
<span class="t">${item.text}</span>
</button>
`).join("")}

</div>

<div class="btn-row">

<button class="btn" onclick="prev()">Previous</button>
<button class="btn primary" onclick="next()">Next</button>

</div>

</div>

</div>
`;

document.querySelectorAll("[data-score]").forEach(btn=>{
btn.onclick=function(){
answers[currentIndex]=Number(this.dataset.score);
renderQuiz();
};
});

}

function prev(){
if(currentIndex>0){
currentIndex--;
renderQuiz();
}
}

function next(){
if(currentIndex<flatQuestions.length-1){
currentIndex++;
renderQuiz();
}else{
renderResults();
}
}

function renderResults(){

const score=answers.reduce((a,b)=>a+(b||0),0);

document.getElementById("app").innerHTML=`

<div class="wrap">

<div class="card hero">

<h1>Your Score</h1>

<h2>${score}</h2>

<p class="muted">This result is for self-reflection only.</p>

<div class="btn-row">
<button class="btn" onclick="renderHome()">Home</button>
</div>

</div>

</div>
`;

}

renderHome();

</script>

</body>
</html>
